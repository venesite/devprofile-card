<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevProfile Card</title>
</head>
<body>
    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Foto de perfil" class="profile-img">
        <h1 class="profile-name">Tu Nombre</h1>
        <p class="profile-role">Desarrollador Full Stack</p>
        <div class="tech-stack">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
        </div>
        <div class="social-links">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#">Twitter</a>
        </div>
    </div>
</body>
</html>
