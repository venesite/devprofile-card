<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generador de tarjetas de perfil para desarrolladores">
    <title>DevProfile Card - Generador de Perfiles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-theme">
    <div class="profile-card">
        <img src="https://via.placeholder.com/150" alt="Foto de perfil" class="profile-img">
        <h1 class="profile-name">Tu Nombre</h1>
        <p class="profile-role">Desarrollador Full Stack</p>
        <div class="tech-stack">
            <span class="tech-badge">HTML</span>
            <span class="tech-badge">CSS</span>
            <span class="tech-badge">JavaScript</span>
        </div>
        <div class="social-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
        </div>
    </div>
</body>
</html>
